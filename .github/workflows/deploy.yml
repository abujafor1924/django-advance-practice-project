name: CI/CD Pipeline

on:
  push:
    branches: [ main, jafor ]
  pull_request:
    branches: [ main, jafor ]

jobs:
  test:
    name: Run Tests & Linting
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "django-insecure-test-key"
      DEBUG: "True"
      DATABASE_URL: "sqlite:///:memory:"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8  # Adding linting tool

      - name: Run Linting
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Migrations (Check for schema issues)
        run: |
          python manage.py migrate

      - name: Run Tests
        run: |
          python manage.py test

  deploy:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # To implement actual deployment, you might use:
          # - appleboy/ssh-action (for SSH based deployment)
          # - docker/build-push-action (for Docker Hub/GHCR)
          # - Google Cloud / AWS CLI for cloud specific deployments
