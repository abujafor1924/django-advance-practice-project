name: Production CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Opt-in to Node.js 24 for all actions to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.TEST_SECRET_KEY }}
      DEBUG: "True"
      DATABASE_URL: "sqlite:///:memory:"

    steps:
      - name: Checkout Code
        # Using a specific version to avoid any resolution ambiguity
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check Database Migrations
        run: |
          python manage.py makemigrations --check --dry-run
          python manage.py migrate

      - name: Run Tests
        run: |
          python manage.py test

  deploy:
    name: Deploy to Production
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            echo "--- Checking Deployment Directory ---"
            if [ ! -d "/var/www/bellevie-backend-code" ]; then
              echo "Error: Directory /var/www/bellevie-backend-code not found on server."
              exit 1
            fi
            cd /var/www/bellevie-backend-code
            
            echo "--- Updating Code ---"
            git fetch origin main
            git reset --hard origin/main
            
            echo "--- Checking Docker Command ---"
            if docker compose version > /dev/null 2>&1; then
              DOCKER_CMD="docker compose"
            else
              DOCKER_CMD="docker-compose"
            fi
            echo "Using command: $DOCKER_CMD"

            cd docker
            
            echo "--- Restarting Services ---"
            $DOCKER_CMD pull || echo "Pull failed, continuing..."
            $DOCKER_CMD up -d --build
            
            echo "--- Post-Deployment Cleanup ---"
            docker image prune -f
            echo "Deployment successful!"
