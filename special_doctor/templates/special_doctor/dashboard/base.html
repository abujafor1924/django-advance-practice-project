<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Special Doctor Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <nav class="bg-indigo-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{% url 'special-doctor-dashboard' %}" class="text-xl font-bold">Bellevie Special Doctor Admin</a>
            <div class="flex items-center space-x-4">
                <a href="{% url 'doctor-dashboard' %}" class="hover:underline">Popular Doctors</a>
                <a href="{% url 'special-doctor-dashboard' %}" class="hover:underline {% if request.resolver_match.url_name == 'special-doctor-dashboard' %}font-bold border-b-2{% endif %}">Special Doctors</a>
                <a href="{% url 'top-doctor-dashboard' %}" class="hover:underline">Top Doctors</a>
                <div class="border-l border-indigo-400 h-6 mx-2"></div>
                <a href="{% url 'special-doctor-add' %}" class="bg-indigo-500 px-3 py-1 rounded hover:bg-indigo-400">Add New</a>
            </div>
        </div>
    </nav>
    <main class="container mx-auto mt-8 p-4">
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-4 rounded {% if message.tags == 'success' %}bg-green-200 text-green-800{% else %}bg-red-200 text-red-800{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
